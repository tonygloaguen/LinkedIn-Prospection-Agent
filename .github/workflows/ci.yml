name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

jobs:
  # ────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — check formatting
        run: ruff format --check .

      - name: Ruff — check linting
        run: ruff check .

  # ────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: mypy — strict type check
        run: poetry run mypy agent/ models/ storage/ utils/ playwright_linkedin/ --ignore-missing-imports

  # ────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: |
          poetry run pytest tests/ \
            --tb=short \
            -q \
            --asyncio-mode=auto \
            --junitxml=test-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

  # ────────────────────────────────────────────
  # SECURITY
  # ────────────────────────────────────────────

  secrets-scan:
    name: "Security — Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to catch secrets in old commits

      - name: Gitleaks — detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: "Security — SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit — full scan (JSON report)
        run: |
          bandit -r agent/ models/ storage/ utils/ playwright_linkedin/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Bandit — block on HIGH/CRITICAL findings
        run: |
          bandit -r agent/ models/ storage/ utils/ playwright_linkedin/ \
            --severity-level high \
            --confidence-level high

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  dependency-audit:
    name: "Security — Dependency Audit (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: false

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Generate lock file if missing
        run: poetry lock --no-update

      - name: Export requirements (no hashes)
        run: poetry export --without-hashes -f requirements.txt -o requirements.txt

      - name: pip-audit — scan CVEs (JSON report)
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --progress-spinner off || true

      - name: pip-audit — fail on unfixed CVEs
        run: pip-audit --requirement requirements.txt --progress-spinner off

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 14

  codeql:
    name: "Security — CodeQL"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ────────────────────────────────────────────
  # GATE
  # ────────────────────────────────────────────

  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, secrets-scan, sast, dependency-audit, codeql]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [typecheck]="${{ needs.typecheck.result }}"
            [test]="${{ needs.test.result }}"
            [secrets-scan]="${{ needs.secrets-scan.result }}"
            [sast]="${{ needs.sast.result }}"
            [dependency-audit]="${{ needs.dependency-audit.result }}"
            [codeql]="${{ needs.codeql.result }}"
          )
          failed=()
          for job in "${!results[@]}"; do
            [[ "${results[$job]}" != "success" ]] && failed+=("$job (${results[$job]})")
          done
          if (( ${#failed[@]} > 0 )); then
            printf "Failed jobs:\n"; printf "  - %s\n" "${failed[@]}"; exit 1
          fi
          echo "All CI + security jobs passed"
