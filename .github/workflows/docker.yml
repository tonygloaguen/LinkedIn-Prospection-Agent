name: Docker — Build, Scan & Push (ARM64)

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  POETRY_VERSION: "2.3.2"

jobs:
  # ────────────────────────────────────────────
  build:
    name: Build Docker image (ARM64)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write  # for Trivy SARIF upload

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # QEMU for cross-compilation ARM64 on x86 CI runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR (skip on PR — no push)
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and OCI labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr
            type=sha,prefix=sha-

      # Build and conditionally push
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          # On PR: build only (no push), load to local daemon for scanning
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance/sbom create manifest lists incompatible with --load (PR builds)
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Image summary
        run: |
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** linux/arm64 (Raspberry Pi 4)" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────
  trivy-image:
    name: "Security — Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image locally for scanning (no push needed)
      - name: Build image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          load: false
          push: false
          tags: linkedin-agent:scan
          cache-from: type=gha
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image from tar
        run: docker load --input /tmp/image.tar

      # Trivy — scan image for OS + library CVEs
      - name: Trivy — full vulnerability scan (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: linkedin-agent:scan
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      # Trivy — upload SARIF to GitHub Security tab
      - name: Trivy — upload SARIF to GitHub Security
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: linkedin-agent:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-docker

      # Fail if CRITICAL CVEs found (HIGH = warning only)
      - name: Trivy — block on CRITICAL CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: linkedin-agent:scan
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-report.json
          retention-days: 30

  # ────────────────────────────────────────────
  trivy-dockerfile:
    name: "Security — Dockerfile Scan (Trivy)"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan Dockerfile for misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload config SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # Strict check: fail on HIGH+ misconfigurations in Dockerfile
      - name: Trivy — block on HIGH misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ────────────────────────────────────────────
  docker-ok:
    name: Docker OK
    runs-on: ubuntu-latest
    needs: [build, trivy-image, trivy-dockerfile]
    if: always()
    steps:
      - name: Check all Docker jobs passed
        run: |
          declare -A results=(
            [build]="${{ needs.build.result }}"
            [trivy-image]="${{ needs.trivy-image.result }}"
            [trivy-dockerfile]="${{ needs.trivy-dockerfile.result }}"
          )
          failed=()
          for job in "${!results[@]}"; do
            [[ "${results[$job]}" != "success" ]] && failed+=("$job (${results[$job]})")
          done
          if (( ${#failed[@]} > 0 )); then
            printf "Failed jobs:\n"; printf "  - %s\n" "${failed[@]}"; exit 1
          fi
          echo "Docker build + security scans passed"
